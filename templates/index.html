<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtDrop CS2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app">
        <!-- Главный экран -->
        <div id="main-screen" class="screen active">
            <div class="header">
                <div class="balance" id="balanceDisplay">
                    <img src="{{ url_for('static', filename='images/coins.png') }}" alt="coins">
                    <span id="coinsValue">0</span>
                </div>
                <div class="profile-btn" onclick="showScreen('profile')">
                    <img src="{{ url_for('static', filename='images/profile.png') }}" alt="profile">
                </div>
            </div>
            <div class="welcome-text">WELCOME</div>
            <div class="grid">
                <div class="card" onclick="showScreen('cases')">
                    <div class="card-icon">🎁</div>
                    <div class="card-title">CASES</div>
                    <div class="card-sub">Open skins</div>
                </div>
                <div class="card" onclick="showScreen('inventory')">
                    <div class="card-icon">📦</div>
                    <div class="card-title">INVENTORY</div>
                    <div class="card-sub">Your items</div>
                </div>
                <div class="card" onclick="showScreen('pvp')">
                    <div class="card-icon">⚔️</div>
                    <div class="card-title">PVP</div>
                    <div class="card-sub">Battle</div>
                </div>
                <div class="card" onclick="showScreen('wheel')">
                    <div class="card-icon">🎡</div>
                    <div class="card-title">WHEEL</div>
                    <div class="card-sub">Spin & win</div>
                </div>
                <div class="card" onclick="showScreen('profile')">
                    <div class="card-icon">👤</div>
                    <div class="card-title">PROFILE</div>
                    <div class="card-sub">Your stats</div>
                </div>
                <div class="card" onclick="showScreen('achievements')">
                    <div class="card-icon">🏅</div>
                    <div class="card-title">ACHIEVEMENTS</div>
                    <div class="card-sub">Rewards</div>
                </div>
            </div>
            <div id="adminPanel" style="margin-top:12px;display:none;">
                <div class="card" onclick="showScreen('admin')">
                    <div class="card-icon">👑</div>
                    <div class="card-title">ADMIN PANEL</div>
                </div>
            </div>
        </div>

        <!-- Экран кейсов -->
        <div id="cases-screen" class="screen">
            <div class="header">
                <div class="balance">
                    <img src="{{ url_for('static', filename='images/coins.png') }}" alt="coins">
                    <span id="casesCoins">0</span>
                </div>
                <button class="modal-close" onclick="showScreen('main')">✕</button>
            </div>
            <div class="page-title">SELECT CASE</div>
            <div id="casesList"></div>
            <button class="case-btn" onclick="showScreen('main')">BACK</button>
        </div>

        <!-- Экран инвентаря -->
        <div id="inventory-screen" class="screen">
            <div class="header">
                <div class="balance">
                    <img src="{{ url_for('static', filename='images/coins.png') }}" alt="coins">
                    <span id="invCoins">0</span>
                </div>
                <button class="modal-close" onclick="showScreen('main')">✕</button>
            </div>
            <div class="page-title">INVENTORY</div>
            <div id="inventoryList" class="scrollable"></div>
            <button class="case-btn" onclick="showScreen('main')">BACK</button>
        </div>

        <!-- Экран профиля -->
        <div id="profile-screen" class="screen">
            <div class="header">
                <div class="balance">
                    <img src="{{ url_for('static', filename='images/coins.png') }}" alt="coins">
                    <span id="profileCoins">0</span>
                </div>
                <button class="modal-close" onclick="showScreen('main')">✕</button>
            </div>
            <div id="profileContent"></div>
            <button class="case-btn" onclick="showScreen('main')">BACK</button>
        </div>

        <!-- Экран колеса -->
        <div id="wheel-screen" class="screen">
            <div class="header">
                <div class="balance">
                    <img src="{{ url_for('static', filename='images/coins.png') }}" alt="coins">
                    <span id="wheelCoins">0</span>
                </div>
                <button class="modal-close" onclick="showScreen('main')">✕</button>
            </div>
            <div class="page-title">WHEEL</div>
            <div id="wheelStatus" class="wheel-status">Spins left: loading...</div>
            <button class="case-btn primary" onclick="spinWheel()" id="spinBtn">SPIN</button>
            <button class="case-btn" onclick="showScreen('main')">BACK</button>
        </div>

        <!-- Экран PVP -->
        <div id="pvp-screen" class="screen">
            <div class="header">
                <div class="balance">
                    <img src="{{ url_for('static', filename='images/coins.png') }}" alt="coins">
                    <span id="pvpCoins">0</span>
                </div>
                <button class="modal-close" onclick="showScreen('main')">✕</button>
            </div>
            <div class="page-title">PVP BATTLE</div>
            <div class="pvp-case-select">
                <span>Case:</span>
                <button class="case-btn" id="pvpCaseBtn" onclick="cyclePvpCase()">BOMJ (500)</button>
            </div>
            <button class="case-btn primary" onclick="findPvpOpponent()" id="pvpSearchBtn">FIND OPPONENT</button>
            <div id="pvpStatus" class="pvp-status"></div>
            <div id="pvpResult" class="pvp-result"></div>
            <button class="case-btn" onclick="showScreen('main')">BACK</button>
        </div>

        <!-- Экран достижений -->
        <div id="achievements-screen" class="screen">
            <div class="header">
                <div class="balance">
                    <img src="{{ url_for('static', filename='images/coins.png') }}" alt="coins">
                    <span id="achCoins">0</span>
                </div>
                <button class="modal-close" onclick="showScreen('main')">✕</button>
            </div>
            <div class="page-title">ACHIEVEMENTS</div>
            <div id="achievementsList" class="scrollable"></div>
            <button class="case-btn" onclick="showScreen('main')">BACK</button>
        </div>

        <!-- Админ-панель -->
        <div id="admin-screen" class="screen">
            <div class="header">
                <div class="balance">
                    <img src="{{ url_for('static', filename='images/coins.png') }}" alt="coins">
                    <span id="adminCoins">0</span>
                </div>
                <button class="modal-close" onclick="showScreen('main')">✕</button>
            </div>
            <div class="page-title">ADMIN PANEL</div>
            <div id="adminContent" class="scrollable"></div>
            <button class="case-btn" onclick="showScreen('main')">BACK</button>
        </div>

        <!-- Модальное окно -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
  </html>
